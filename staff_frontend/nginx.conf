server {
    listen 80;
    server_name localhost;
    
    root /home/zhibek/dist;
    
    location /staff/inspector/ {
        try_files /dealer.html =404;
    }

    location /staff/cashier/ {
        try_files /dealer.html =404;
    }

    location /staff/ {
        try_files /dealer.html =404;
    }
    
    location /assets/ {
        try_files $uri =404;
    }

    # Catch-all for any other static files
    location / {
        try_files $uri $uri/ =404;
    }
}
